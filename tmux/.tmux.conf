unbind r
bind r source-file ~/.tmux.conf

set -g default-shell /usr/bin/zsh

set-option -g prefix C-a
bind-key C-a send-prefix

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g allow-passthrough on
set -g focus-events on

# OSC 52 clipboard — works locally and over SSH
set -s set-clipboard on
set -as terminal-features ',*:clipboard'

# Fix Ctrl+Backspace visual issues and tab switching
unbind -n C-?
set -g terminal-features 'xterm*:clipboard:ccolour:cstyle:focus:title'

set -g mouse on

set-window-option -g mode-keys vi

# Keep cursor in place after mouse selection (don't exit copy-mode / jump to bottom)
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top

# Make tmux follow terminal font/size changes automatically
set-option -g window-size latest

# Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "custom"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
# Window index in Mandarin numerals (零–九, 10 = 十); index ≥ 11 falls back to the raw number
set -g @catppuccin_window_number "#{?#{==:#I,0},零,#{?#{==:#I,1},一,#{?#{==:#I,2},二,#{?#{==:#I,3},三,#{?#{==:#I,4},四,#{?#{==:#I,5},五,#{?#{==:#I,6},六,#{?#{==:#I,7},七,#{?#{==:#I,8},八,#{?#{==:#I,9},九,#{?#{==:#I,10},十,#I}}}}}}}}}}}"
set -g @catppuccin_window_current_number "#{?#{==:#I,0},零,#{?#{==:#I,1},一,#{?#{==:#I,2},二,#{?#{==:#I,3},三,#{?#{==:#I,4},四,#{?#{==:#I,5},五,#{?#{==:#I,6},六,#{?#{==:#I,7},七,#{?#{==:#I,8},八,#{?#{==:#I,9},九,#{?#{==:#I,10},十,#I}}}}}}}}}}}"
set -g @catppuccin_directory_text "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.0'

# Disable vim-tmux-navigator for Ctrl+Backspace
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-?' if-shell "$is_vim" 'send-keys C-?' ''

set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_session}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Catppuccin v2 status modules — must be loaded AFTER tpm initializes the plugin
source-file ~/.tmux/plugins/tmux/status/directory.conf
source-file ~/.tmux/plugins/tmux/status/session.conf

set -g status-right-length 100
