unbind r
bind r source-file ~/.tmux.conf

set-option -g prefix C-a
bind-key C-a send-prefix

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
# set -g allow-passthrough on

# Fix Ctrl+Backspace visual issues and tab switching
# Unbind C-? (which Ctrl+Backspace often sends)
unbind -n C-?
# Ensure proper backspace handling
set -g terminal-features 'xterm*:clipboard:colour:cstyle:focus:title'

# set -g prefix C-s

set -g mouse on
set -g extended-keys

set-window-option -g mode-keys vi
# split-window -v
# select-layout even-vertical

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top

# Make tmux follow terminal font/size changes automatically
set-option -g window-size latest

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application} #{E:@catppuccin_status_session}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Disable transparency for better text rendering
# set -g status-style bg=default
